<main>
    <section>
        <h2>Select Status:</h2>
        <form id="traceSelect">
            <label for="ftiobox">Predict phases with FTIO:</label>
            <input type="checkbox" id="ftiobox" name="ftiobox" checked>
            <br><br>
        </form>
    </section>
    <section>
        <h2>Parameters:</h2>
        <form id="ftioParameters">
            <div id="freqGroup" class="ftio-params">
                <label for="samplingRateField">Frequency of sampling rate: </label>
                <span class="info-symbol"
                    title="Specifies the sampling rate with which the continuous signal is discretized. This directly affects the highest captured frequency (Nyquist). The value is specified in Hz. In case this value is set to -1, the auto mode is launched which sets the sampling frequency automatically to the smallest change in the bandwidth detected. Note that the lowest allowed frequency in the auto mode is determined by the `memory_limit`.&#10;Default: 10, Type: float">&#x1F6C8</span>
                <input type="number" id="samplingRateField" name="samplingRateField" step="0.001" value="10.0">
            </div>


            <div id="memoryLimitGroup" class="ftio-params">
                <label for="memoryLimitField">Memory limit: </label>
                <span class="info-symbol"
                    title="Memory limit in GB during discretization in case `freq` is passed with -1.&#10;Default: 0.5, Type: float">&#x1F6C8</span>
                <input type="number" id="memoryLimitField" name="memoryLimitField" step="0.001" value="0.5">
            </div>


            <div id="tsGroup" class="ftio-params">
                <label for="tsField">Start time (ts): </label>
                <span class="info-symbol" title="Modifies the start time of the examined time window.&#10;Type: float">&#x1F6C8</span>
                <input type="number" id="tsField" name="tsField" step="0.001" min="0">
            </div>


            <div id="teGroup" class="ftio-params">
                <label for="teField">End time (te): </label>
                <span class="info-symbol" title="Modifies the end time of the examined time window.&#10;Type: float">&#x1F6C8</span>
                <input type="number" id="teField" name="teField" step="0.001" min="0">
            </div>


            <div id="techniqueGroup" class="ftio-params">
                <label for="techniqueMenu">Frequency technique: </label>
                <span class="info-symbol" title="Specifies the frequency technique to use.&#10;Type: String">&#x1F6C8</span>
                <select name="techniqueMenu" id="techniqueMenu">
                    <option value="dft">Discrete Fourier Transformation</option>
                    <option value="wave_disc">Discrete Wavelet Transformation</option>
                    <option value="wave_cont">Continuous Wavelet Transformation</option>
                </select>
            </div>


            <div id="levelGroup" class="ftio-params">
                <label for="levelField">Wavelet level: </label>
                <span class="info-symbol"
                    title="Specifies the decomposition level for the discrete wavelet transformation. If specified as auto (0), the maximum decomposition level is automatically calculated.&#10;Default: 3, Type: int">&#x1F6C8</span>
                <input type="number" id="levelField" name="levelField" min="0" step="1" value="3">
            </div>


            <div id="waveletGroup" class="ftio-params">
                <label for="waveletField">Wavelet type: </label>
                <span class="info-symbol"
                    title="Wavelet to use. See pywt documentation for wavelet families: pywt.wavelist(kind='continuous') or pywt.wavelist(kind='discrete').&#10;Default: 'morl' for continuous / 'db1' for discrete, Type: String)">&#x1F6C8</span>
                <input type="text" id="waveletField" name="waveletField">
            </div>


            <div id="outlierGroup" class="ftio-params">
                <label for="outlierMenu">Outlier detection: </label>
                <span class="info-symbol"
                    title="Outlier detection method: Z-score, DB-Scan, Isolation_forest, LOF, find_peaks (from sci-pi).&#10;Default: Z-score, Type: String">&#x1F6C8</span>
                <select name="outlierMenu" id="outlierMenu">
                    <option value="z-score">Z-score</option>
                    <option value="dbscan">DB-scan</option>
                    <option value="forest">Isolation forest</option>
                    <option value="lof">Local outlier factor</option>
                    <option value="peak">find_peaks (from sci-pi)</option>
                </select>
            </div>


            <div id="periodicityGroup" class="ftio-params">
                <label for="periodicityMenu">Periodicity detection: </label>
                <span class="info-symbol"
                    title="Periodicity detection method after outlier detection: RPDE, Spectral flatness, Correlation, Correlation for individual periods.&#10;Default: None, Type: String">&#x1F6C8</span>
                <select name="periodicityMenu" id="periodicityMenu">
                    <option value="">None</option>
                    <option value="rpde">RPDE</option>
                    <option value="sf">Spectral flatness</option>
                    <option value="corr">Correlation</option>
                    <option value="ind">Correlation for individual periods</option>
                </select>
            </div>


            <div id="toleranceGroup" class="ftio-params">
                <label for="toleranceField">Tolerance value: </label>
                <span class="info-symbol" title="Tolerance value used.&#10;Default: 0.8, Type: float">&#x1F6C8</span>
                <input type="number" id="toleranceField" name="toleranceField" min="0" max="1" step="0.001" value="0.8">
            </div>


            <div id="dtwGroup" class="ftio-params">
                <label for="dtwBox">Dynamic time warping:</label>
                <span class="info-symbol"
                    title="Performs dynamic time warping on the top 3 frequencies (highest contribution) calculated using the DFT if set.&#10;Default: false, Type: bool">&#x1F6C8</span>
                <input type="checkbox" id="dtwBox" name="dtwBox">
            </div>


            <div id="spectrumGroup" class="ftio-params">
                <label for="spectrumMenu">Spectrum: </label>
                <span class="info-symbol"
                    title="Choose between the power density spectrum (a*a/N) and the amplitude spectrum (a).&#10;Default: Amplitude, Type: bool">&#x1F6C8</span>
                <select name="spectrumMenu" id="spectrumMenu">
                    <option value="powerDensity">Power density spectrum</option>
                    <option value="amplitude">Amplitude spectrum</option>
                </select>
            </div>


            <div id="nFreqGroup" class="ftio-params">
                <label for="nFreqField">Number of frequencies to extract: </label>
                <span class="info-symbol"
                    title="Number of frequencies to extract. By default FTIO finds the dominant frequency. With this flag, up to 'n_freq' can be extracted from FTIO.&#10;Default: 10, Type: int">&#x1F6C8</span>
                <input type="number" id="nFreqField" name="nFreqField" min="0" step="1" value="10">
            </div>


            <div id="fourierFitGroup" class="ftio-params">
                <label for="fourierFitBox">Fourier fit:</label>
                <span class="info-symbol"
                    title="If set, performs Fourier basis fitting on the signal by extracting multiple dominant frequencies via DFT and fitting sinusoidal components with optimized amplitudes and phases. The number of fitting sinusoidal components is set via '--n_freq'.&#10;Default: false, Type: bool">&#x1F6C8</span>
                <input type="checkbox" id="fourierFitBox" name="fourierFitBox">
            </div>


            <div id="autocorrelationGroup" class="ftio-params">
                <label for="autocorrelationBox">Autocorrelation:</label>
                <span class="info-symbol"
                    title="If set, autocorrelation is calculated in addition to DFT. The results are merged to a single prediction at the end.&#10;Default: false, Type: bool">&#x1F6C8</span>
                <input type="checkbox" id="autocorrelationBox" name="autocorrelationBox">
            </div>


            <div id="windowAdaptationGroup" class="ftio-params">
                <label for="windowAdaptationField">Window adaptation: </label>
                <span class="info-symbol"
                    title="Online time window adaptation. If set to Frequency Hits, the time window is shifted on X 'frequency hits' (a dominant frequency was found) to X times the last found period from the current instance. Alternatively it can be set to 'data' to move the window to X times after data has been received.&#10;Default: None, Type: String">&#x1F6C8</span>
                <select name="windowAdaptationField" id="windowAdaptationField">
                    <option value="">None</option>
                    <option value="frequency_hits">Frequency Hits</option>
                    <option value="data">Data</option>
                </select>
            </div>


            <div id="hitsGroup" class="ftio-params">
                <label for="hitsField">Frequency Hits: </label>
                <span class="info-symbol"
                    title="Specifies the number of hits needed to adapt the time window. A hit occurs once a dominant frequency is found.&#10;Default: 3.0 Type: float">&#x1F6C8</span>
                <input type="number" id="hitsField" name="hitsField" step="0.01" value="3.0">
            </div>


            <div id="filterTypeGroup" class="ftio-params">
                <label for="filterTypeField">Filter type: </label>
                <span class="info-symbol" title="Type of filter to apply.&#10;Default: None, Type: String">&#x1F6C8</span>
                <select name="filterTypeField" id="filterTypeField">
                    <option value="">None</option>
                    <option value="lowpass">Lowpass</option>
                    <option value="highpass">Highpass</option>
                    <option value="bandpass">Bandpass</option>
                </select>
            </div>


            <div id="filterCutoffGroup" class="ftio-params">
                <label for="filterCutoffField">Filter cutoff: </label>
                <span class="info-symbol"
                    title="Cutoff frequency for low/high-pass filters or low and high cutoff for bandpass.&#10;Type: float">&#x1F6C8</span>
                <input style="margin-right: 30px;" type="number" id="filterCutoffField" name="filterCutoffField"
                    step="0.01">
                <input type="number" id="filterCutoff2Field" name="filterCutoff2Field" step="0.01">
            </div>


            <div id="filterOrderGroup" class="ftio-params">
                <label for="filterOrderField">Filter order: </label>
                <span class="info-symbol" title="Order of Butterworth filter.&#10;Default: 4, Type: int">&#x1F6C8</span>
                <input type="number" id="filterOrderField" name="filterOrderField" min="1" step="1" value="4">
            </div>


            <hr style="border: none; border-top: 1px solid rgb(196, 196, 196); margin: 20px 0;">


            <div id="customArgsGroup" class="ftio-params">
                <label for="cmdInput">Custom Parameters: </label>
                <span class="info-symbol"
                    title="This field can be used to set FTIO parameters not present here.">&#x1F6C8</span>
                <input type="text" id="cmdInput" placeholder="Enter custom parameters here..." style="width:65%;">
            </div>

            <div id="copyButtonGroup" class="ftio-params">
                <label for="copyBtn">Copy from predefined Parameters: </label>
                <span class="info-symbol"
                    title="Copy input parameters into the custom parameters field, use when predefined inputs need to be replaced. Copied parameters prioritize the values in this field.">&#x1F6C8</span>
                <button type="button" id="copyBtn">Copy</button>
            </div>

            <div id="clearButtonGroup" class="ftio-params">
                <label for="clearBtn">Clear Custom Parameters: </label>
                <button type="button" id="clearBtn">Clear</button>
            </div>


            <hr style="border: none; border-top: 1px solid rgb(170, 170, 170); margin: 20px 0;">


            <div id="restoreButtonGroup" class="ftio-params">
                <label for="restoreBtn">Restore Parameters: </label>
                <span class="info-symbol"
                    title="Override input fields with the parameters saved on the server.">&#x1F6C8</span>
                <button type="button" id="restoreBtn">Restore</button>
            </div>


            <br>

            <div id="saveButtonGroup" class="ftio-params">
                <label for="saveBtn">Save Parameters: </label>
                <button type="button" id="saveBtn">Save</button>
            </div>
        </form>


    </section>

    <script>
        async function populateParameters() {
            fetch('/ftio/args', { method: 'GET' })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('samplingRateField').value = data.freq ?? 10.0;
                    document.getElementById('memoryLimitField').value = data.memory_limit ?? '';
                    document.getElementById('tsField').value = data.ts ?? '';
                    document.getElementById('teField').value = data.te ?? '';
                    document.getElementById('techniqueMenu').value = data.transformation ?? 'dft';
                    document.getElementById('levelField').value = data.level ?? '';
                    document.getElementById('waveletField').value = data.wavelet ?? '';
                    document.getElementById('outlierMenu').value = data.outlier ?? 'z-score';
                    document.getElementById('periodicityMenu').value = data.periodicity_detection ?? '';
                    document.getElementById('toleranceField').value = data.tol ?? 0.8;
                    document.getElementById('dtwBox').checked = data.dtw ?? false;
                    document.getElementById('spectrumMenu').value = data.no_psd ? 'amplitude' : 'powerDensity';
                    document.getElementById('nFreqField').value = data.n_freq ?? 10;
                    document.getElementById('fourierFitBox').checked = data.fourier_fit ?? false;
                    document.getElementById('autocorrelationBox').checked = data.autocorrelation ?? false;
                    document.getElementById('windowAdaptationField').value = data.window_adaptation ?? '';
                    document.getElementById('hitsField').value = data.hits ?? '';
                    document.getElementById('filterTypeField').value = data.filter_type ?? '';
                    document.getElementById('filterCutoffField').value = data.filter_cutoff ?? '';
                    document.getElementById('filterCutoff2Field').value = data.filter_cutoff2 ?? '';
                    document.getElementById('filterOrderField').value = data.filter_order ?? '';
                    document.getElementById('cmdInput').value = data.custom_args ?? '';
                    toggleMemoryLimit();
                    toggleDecompLevel();
                    toggleWaveletType();
                    toggleHitsNeeded();
                    toggleFilter();
                });
        }

        async function saveParameters() {
            const customArgsRaw = document.getElementById('cmdInput').value || "";
            const customArgs = parseCustomArgs(customArgsRaw);

            // Use custom flag if present, else UI field
            const get = (flag, fallback) => customArgs[flag] !== undefined ? customArgs[flag] : fallback;

            const payload = {
                freq: parseFloat(get("freq", document.getElementById('samplingRateField').value)),
                memory_limit: parseFloat(get("memory_limit",
                    parseFloat(document.getElementById('samplingRateField').value) === -1
                        ? document.getElementById('memoryLimitField').value
                        : null)),
                ts: parseFloat(get("ts", document.getElementById('tsField').value)) || null,
                te: parseFloat(get("te", document.getElementById('teField').value)) || null,
                transformation: get("transformation", document.getElementById('techniqueMenu').value),
                level: document.getElementById('techniqueMenu').value === "wave_disc"
                    ? parseInt(get("level", document.getElementById('levelField').value))
                    : null,
                wavelet: get("wavelet",
                    (["wave_disc", "wave_cont"].includes(document.getElementById('techniqueMenu').value))
                        ? document.getElementById('waveletField').value
                        : null),
                outlier: get("outlier", document.getElementById('outlierMenu').value),
                periodicity_detection: get("periodicity_detection", document.getElementById('periodicityMenu').value || null),
                tol: parseFloat(get("tol", document.getElementById('toleranceField').value)),
                dtw: get("dtw", document.getElementById('dtwBox').checked),
                no_psd: get("no_psd", document.getElementById('spectrumMenu').value === 'amplitude'),
                n_freq: parseInt(get("n_freq", document.getElementById('nFreqField').value)),
                fourier_fit: get("fourier_fit", document.getElementById('fourierFitBox').checked),
                autocorrelation: get("autocorrelation", document.getElementById('autocorrelationBox').checked),
                window_adaptation: get("window_adaptation", document.getElementById('windowAdaptationField').value || null),
                hits: get("hits",
                    document.getElementById('windowAdaptationField').value === 'frequency_hits'
                        ? document.getElementById('hitsField').value
                        : null),
                filter_type: get("filter_type", document.getElementById('filterTypeField').value || null),
                filter_cutoff: parseFloat(get("filter_cutoff",
                    (document.getElementById('filterTypeField').value && document.getElementById('filterCutoffField').value)
                        ? document.getElementById('filterCutoffField').value
                        : null)),
                filter_cutoff2: parseFloat(get("filter_cutoff2",
                    (document.getElementById('filterTypeField').value === "bandpass" && document.getElementById('filterCutoff2Field').value)
                        ? document.getElementById('filterCutoff2Field').value
                        : null)),
                filter_order: parseInt(get("filter_order",
                    (document.getElementById('filterTypeField').value && document.getElementById('filterOrderField').value)
                        ? document.getElementById('filterOrderField').value
                        : null)),
                custom_args: customArgsRaw || null
            };

            fetch('/ftio/args', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(response => {
                if (response.ok) {
                    console.log('Parameters saved successfully!');
                } else {
                    console.error('Failed to save parameters.');
                }
            });
        }

        function copyParameters() {

            const nameMap = {
                samplingRateField: "freq",
                memoryLimitField: "memory_limit",
                tsField: "ts",
                teField: "te",
                techniqueMenu: "transformation",
                levelField: "level",
                waveletField: "wavelet",
                outlierMenu: "outlier",
                periodicityMenu: "periodicity_detection",
                toleranceField: "tol",
                dtwBox: "dtw",
                spectrumMenu: "no_psd",
                nFreqField: "n_freq",
                fourierFitBox: "fourier_fit",
                autocorrelationBox: "autocorrelation",
                windowAdaptationField: "window_adaptation",
                hitsField: "hits",
                filterTypeField: "filter_type",
                filterCutoffField: "filter_cutoff",
                filterCutoff2Field: "filter_cutoff2",
                filterOrderField: "filter_order"
            };

            console.log(nameMap);

            const params = [];
            const fields = document.querySelectorAll('#ftioParameters .ftio-params input, #ftioParameters .ftio-params select');

            fields.forEach(field => {
                const cliName = nameMap[field.name];

                if (!cliName) return;

                // Special handling for amplitude spectrum = no_psd flag
                if (field.name === "spectrumMenu") {
                    if (field.value === "amplitude") {
                        params.push("--no_psd");
                    }
                    return;
                }

                if (field.type === "checkbox") {
                    if (field.checked) params.push(`--${cliName}`);
                } else if (field.value !== "" && field.value != null) {
                    params.push(`--${cliName} ${field.value}`);
                }
            });

            const current = document.getElementById("cmdInput").value.trim();
            document.getElementById("cmdInput").value = params.join(" ") + (current ? " " + current : "");

        }

        function parseCustomArgs(argString) {
            const args = {};
            const tokens = argString.trim().split(/\s+/);

            for (let i = 0; i < tokens.length; i++) {
                if (tokens[i].startsWith("--")) {
                    const key = tokens[i].replace(/^--/, "");
                    const next = tokens[i + 1];

                    // If next token is not another flag, treat it as value
                    if (next && !next.startsWith("--")) {
                        args[key] = next;
                        i++;
                    } else {
                        // Boolean flag
                        args[key] = true;
                    }
                }
            }
            return args;
        }

        function toggleMemoryLimit() {
            const freqVal = parseFloat(document.getElementById('samplingRateField').value);
            const memGroup = document.getElementById('memoryLimitGroup');
            memGroup.style.display = (freqVal === -1) ? 'block' : 'none';
        }
        function toggleDecompLevel() {
            const techniqueVal = document.getElementById('techniqueMenu').value;
            const levelGroup = document.getElementById('levelGroup');
            levelGroup.style.display = (techniqueVal === 'wave_disc') ? 'block' : 'none';
        }
        function toggleWaveletType() {
            const techniqueVal = document.getElementById('techniqueMenu').value;
            const waveletGroup = document.getElementById('waveletGroup');
            waveletGroup.style.display = (techniqueVal === 'wave_disc' || techniqueVal === 'wave_cont') ? 'block' : 'none';
        }
        function toggleHitsNeeded() {
            const windowAdaptationVal = document.getElementById('windowAdaptationField').value;
            const hitsGroup = document.getElementById('hitsGroup');
            hitsGroup.style.display = (windowAdaptationVal === 'frequency_hits') ? 'block' : 'none';
        }
        function toggleFilter() {
            const filterTypeVal = document.getElementById('filterTypeField').value;
            const filterCutoffGroup = document.getElementById('filterCutoffGroup');
            const filterOrderGroup = document.getElementById('filterOrderGroup');
            filterCutoffGroup.style.display = (filterTypeVal !== '') ? 'block' : 'none';
            filterOrderGroup.style.display = (filterTypeVal !== '') ? 'block' : 'none';

            const filterCutoff2Field = document.getElementById('filterCutoff2Field');
            if (filterTypeVal === 'bandpass') {
                filterCutoff2Field.style.display = 'inline-block';
            } else {
                filterCutoff2Field.style.display = 'none';
            }
        }

        document.getElementById('samplingRateField').addEventListener('input', toggleMemoryLimit);
        document.getElementById('techniqueMenu').addEventListener('change', toggleDecompLevel);
        document.getElementById('techniqueMenu').addEventListener('change', toggleWaveletType);
        document.getElementById('windowAdaptationField').addEventListener('change', toggleHitsNeeded);
        document.getElementById('filterTypeField').addEventListener('change', toggleFilter);
        document.getElementById('saveBtn').addEventListener('click', saveParameters);
        document.getElementById('restoreBtn').addEventListener('click', populateParameters);
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('cmdInput').value = '';
        });

        document.getElementById('copyBtn').addEventListener('click', copyParameters);

        populateParameters();
    </script>
</main>
