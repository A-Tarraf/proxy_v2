<main>
    <section>
        <h2>Select Status:</h2>
        <form id="traceSelect">
            <label for="ftiobox">Predict phases with FTIO:</label>
            <input type="checkbox" id="ftiobox" name="ftiobox" checked>
            <br><br>
        </form>
    </section>
    <section>
        <h2>Parameters:</h2>
        <form id="ftioParameters">
            <label for="samplingRateField">Frequency of sampling rate:</label>
            <input type="number" id="samplingRateField" name="samplingRateField" min="-1" value="-1">
            <br><br>

            <label for="techniqueMenu">Frequency technique:</label>
            <select name="techniqueMenu" id="techniqueMenu">
                <option value="dft">Discrete Fourier Transformation</option>
                <option value="wave_disc">Discrete Wavelet Transformation</option>
                <option value="wave_cont">Continuous Wavelet Transformation</option>
            </select>
            <br><br>

            <label for="outlierMenu">Outlier detection:</label>
            <select name="outlierMenu" id="outlierMenu">
                <option value="Z-score">Z-score</option>
                <option value="DB-scan">DB-scan</option>
                <option value="Isolation_forest">Isolation forest</option>
                <option value="LOF">Local outlier factor</option>
            </select>
            <br><br>

            <label for="toleranceField">Tolerance value:</label>
            <input type="number" id="toleranceField" name="toleranceField" min="0" max="1" step="0.001" value="0.8">
            <br><br>

            <label for="dtwBox">Dynamic time wrapping:</label>
            <input type="checkbox" id="dtwBox" name="dtwBox">
            <br><br>

            <label for="spectrumMenu">Spectrum:</label>
            <select name="spectrumMenu" id="spectrumMenu">
                <option value="powerDensity">Power density spectrum</option>
                <option value="amplitude">Amplitude spectrum</option>
            </select>
            <br><br>

            <label for="autocorrelationBox">Autocorrelation:</label>
            <input type="checkbox" id="autocorrelationBox" name="autocorrelationBox">
            <br><br>

            <label for="windowAdaptationBox">Window adaptation:</label>
            <input type="checkbox" id="windowAdaptationBox" name="windowAdaptationBox">
            <br><br>

            <label for="freqHitsField">Frequency hits:</label>
            <input type="number" id="freqHitsField" name="freqHitsField" min="1" value="3">
            <br><br>

            <button type="button" id="saveBtn">Save Parameters</button>
        </form>
    </section>

    <script>
        async function populateParameters() {
            fetch('/ftio/args', { method: 'GET' })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('samplingRateField').value = data.freq ?? -1;
                    document.getElementById('techniqueMenu').value = data.transformation ?? 'dft';
                    document.getElementById('outlierMenu').value = data.outlier ?? 'Z-score';
                    document.getElementById('toleranceField').value = data.tol ?? 0.8;
                    document.getElementById('dtwBox').checked = data.dtw ?? false;
                    document.getElementById('spectrumMenu').value = data.no_psd ? 'amplitude' : 'powerDensity';
                    document.getElementById('autocorrelationBox').checked = data.autocorrelation ?? false;
                    document.getElementById('windowAdaptationBox').checked = data.window_adaptation ?? false;
                    document.getElementById('freqHitsField').value = data.frequency_hits ?? 3;
                });
        }

        async function saveParameters() {
            const payload = {
                freq: parseInt(document.getElementById('samplingRateField').value),
                transformation: document.getElementById('techniqueMenu').value,
                outlier: document.getElementById('outlierMenu').value,
                tol: parseFloat(document.getElementById('toleranceField').value),
                dtw: document.getElementById('dtwBox').checked,
                no_psd: document.getElementById('spectrumMenu').value === 'amplitude',
                autocorrelation: document.getElementById('autocorrelationBox').checked,
                window_adaptation: document.getElementById('windowAdaptationBox').checked,
                frequency_hits: parseInt(document.getElementById('freqHitsField').value)
            };

            fetch('/ftio/args', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(response => {
                if (response.ok) {
                    console.log('Parameters saved successfully!');
                } else {
                    console.error('Failed to save parameters.');
                }
            });
        }

        document.getElementById('saveBtn').addEventListener('click', saveParameters);

        populateParameters();
    </script>
</main>
