<main>
    <section>
        <h2>Select Target:</h2>
        <form id="traceSelect">
            <label for="target">Target:</label>
            <select id="target" name="target" required>
                <!-- Options for selecting the target will be added dynamically using JavaScript -->
            </select><br><br>

            <label for="metric">Metric:</label>
            <select id="metric" name="metric" required>
                <!-- Options for selecting the metric will be added dynamically using JavaScript -->
            </select><br><br>

            <label for="ftiobox">Predict phases with FTIO:</label>
            <input type="checkbox" id="ftiobox" name="ftiobox" checked>
            <br><br>
        </form>
    </section>
    <section>
        <h2>Parameters:</h2>
        <form id="ftioParameters">
            <label for="samplingRateField">Frequency of sampling rate:</label>
            <input type="number" id="samplingRateField" name="samplingRateField" min="-1" value="-1"> 
            <br><br>

            <label for="techniqueMenu">Frequency technique:</label>
            <select name="techniqueMenu" id="techniqueMenu">
              <option value="dft">Discrete fourier transformation</option>
              <option value="wave_disc">Discrete wavelet transformation</option>
              <option value="wave_cont">Continuous wavelet transformation</option>
            </select> 
            <br><br>

            <label for="outlierMenu">Outlier detection:</label>
            <select name="outlierMenu" id="outlierMenu">
              <option value="zscore">Z-score</option>
              <option value="dbscan">DB-scan</option>
              <option value="isolationForest">Isolation forest</option>
              <option value="lof">Local outlier factor</option>
            </select> 
            <br><br>

            <label for="toleranceField">Tolerance value:</label>
            <input type="number" id="toleranceField" name="toleranceField" min="0" max="1" step="0.001" value="0.8"> 
            <br><br>

            <label for="dtwBox">Dynamic time wrapping:</label>
            <input type="checkbox" id="dtwBox" name="dtwBox">
            <br><br>

            <label for="spectrumMenu">Spectrum:</label>
            <select name="spectrumMenu" id="spectrumMenu">
              <option value="powerDensity">Power density spectrum</option>
              <option value="amplitude">Amplitude spectrum</option>
            </select> 
            <br><br>

            <label for="autocorrelationBox">Autocorrelation:</label>
            <input type="checkbox" id="autocorrelationBox" name="autocorrelationBox">
            <br><br>

            <label for="windowAdaptationBox">Window adaptation:</label>
            <input type="checkbox" id="windowAdaptationBox" name="windowAdaptationBox">
            <br><br>

            <label for="freqHitsField">Frequency hits:</label>
            <input type="number" id="freqHitsField" name="freqHitsField" min="1" value="3"> 
            <br><br>

        </form>
    </section>

    <script>
        // Function to populate the Metric select element based on the selected Target
        async function populateMetricSelect() {
            const targetSelect = document.getElementById('target');
            const metricSelect = document.getElementById('metric');
            const selectedTarget = targetSelect.value;

            // Clear existing options
            metricSelect.innerHTML = '';

            try {
                const response = await fetch("/trace/metrics?job=" + selectedTarget);
                if (response.ok) {
                    const data = await response.json();

                    // Sort the data before creating and appending options
                    data.sort((a, b) => a.localeCompare(b));

                    for (const v of data) {
                        const option = document.createElement('option');
                        option.value = v;
                        option.text = v;
                        metricSelect.appendChild(option);
                    }
                } else {
                    console.error(`Failed to fetch data from ${endpoint}`);
                }
            } catch (error) {
                console.error(error);
            }
        }


        async function populateJobSelect() {
            // Fetch data from the /trace/list endpoint
            fetch('/trace/list') // Replace with the actual endpoint URL
                .then(response => response.json())
                .then(data => {
                    const comboBox = document.getElementById('target');

                    // Sort data based on jobid
                    data.sort((a, b) => a.desc.jobid.localeCompare(b.desc.jobid));

                    // Remove existing options from the select element
                    comboBox.innerHTML = "";

                    // Create an option element for each "jobid" and append to the select element
                    data.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.desc.jobid;
                        option.textContent = item.desc.jobid + " : " + item.desc.command;
                        comboBox.appendChild(option);
                    });

                    // Set the value to the first option
                    comboBox.value = comboBox.options[0].value;

                    // Create a new event
                    const event = new Event('change');
                    // Dispatch the event to trigger the event listener
                    comboBox.dispatchEvent(event);
                })
                .catch(error => console.error('Error fetching data:', error));

            populateMetricSelect();
        }

        // Initialize the Metric select options based on the default Target
        populateJobSelect();

        const target = document.getElementById('target').value;
        const metric = document.getElementById('metric').value;


        // Event listener to populate the Metric select element when the Target changes
        document.getElementById('target').addEventListener('change', populateMetricSelect);
    </script>
</main>
